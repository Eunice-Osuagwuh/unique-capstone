name: Taskline CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            uniquetee12/taskline-frontend:${{ steps.sha.outputs.sha }}
            uniquetee12/taskline-frontend:latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            uniquetee12/taskline-backend:${{ steps.sha.outputs.sha }}
            uniquetee12/taskline-backend:latest

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_BACKEND_KEY }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP }}
          TF_VAR_location: ${{ vars.AZURE_LOCATION }}
          TF_VAR_aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}
          TF_VAR_db_server_name: ${{ vars.DB_SERVER_NAME }}
          TF_VAR_db_name: ${{ vars.DB_NAME }}
          TF_VAR_db_admin_user: ${{ secrets.DB_ADMIN_USER }}
          TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_key_vault_name: ${{ vars.KEY_VAULT_NAME }}
          TF_VAR_frontend_image: uniquetee12/taskline-frontend:${{ needs.build-and-push.outputs.sha }}
          TF_VAR_backend_image: uniquetee12/taskline-backend:${{ needs.build-and-push.outputs.sha }}

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP }}
          TF_VAR_location: ${{ vars.AZURE_LOCATION }}
          TF_VAR_aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}
          TF_VAR_db_server_name: ${{ vars.DB_SERVER_NAME }}
          TF_VAR_db_name: ${{ vars.DB_NAME }}
          TF_VAR_db_admin_user: ${{ secrets.DB_ADMIN_USER }}
          TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_key_vault_name: ${{ vars.KEY_VAULT_NAME }}
          TF_VAR_frontend_image: uniquetee12/taskline-frontend:${{ needs.build-and-push.outputs.sha }}
          TF_VAR_backend_image: uniquetee12/taskline-backend:${{ needs.build-and-push.outputs.sha }}

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name ${{ vars.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Create Kubernetes secret
        run: |
          kubectl create secret generic backend-secret \
            --from-literal=DB_HOST=$(az postgres flexible-server show \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --name ${{ vars.DB_SERVER_NAME }} \
              --query fullyQualifiedDomainName -o tsv) \
            --from-literal=DB_PORT=5432 \
            --from-literal=DB_NAME=${{ vars.DB_NAME }} \
            --from-literal=DB_USER=${{ secrets.DB_ADMIN_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_ADMIN_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=uniquetee12/taskline-frontend:${{ needs.build-and-push.outputs.sha }} || \
          kubectl apply -f k8s/local/frontend.yaml

      - name: Deploy backend
        run: |
          kubectl set image deployment/backend \
            backend=uniquetee12/taskline-backend:${{ needs.build-and-push.outputs.sha }} || \
          kubectl apply -f k8s/local/backend.yaml

      - name: Confirm rollout
        run: |
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/backend --timeout=120s

      - name: Show running pods
        run: kubectl get pods
